# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Single source of truth for DB image versions:
#   Neo4j  — NEO4J_IMAGE in .env.example (docker-compose reads via ${NEO4J_IMAGE})
#   Postgres — image hardcoded in docker-compose.yml
# All jobs use `docker compose up -d` so no version is duplicated here.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v -m "not neo4j and not postgres and not browser" --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Start DB services
        run: |
          cp .env.example .env
          docker compose up -d

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"

      - name: Wait for PostgreSQL
        run: |
          timeout 60 sh -c \
            'until docker compose exec -T postgres pg_isready -U odoo_semantic 2>/dev/null; \
             do sleep 2; done'

      - name: Wait for Neo4j
        run: |
          timeout 120 sh -c \
            'until docker compose exec -T neo4j wget -q --spider http://localhost:7474 2>/dev/null; \
             do sleep 3; done'

      # Exclude smoke + browser — each runs in its own job for clear failure signals.
      - run: pytest tests/ -v -m "(neo4j or postgres) and not smoke and not browser" --tb=short
        env:
          NEO4J_TEST_URI: bolt://localhost:7687
          NEO4J_TEST_USER: neo4j
          NEO4J_TEST_PASSWORD: password
          PG_TEST_DSN: postgresql://odoo_semantic:password@localhost:5432/odoo_semantic

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Start Neo4j
        run: |
          cp .env.example .env
          docker compose up -d neo4j

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"

      - name: Wait for Neo4j
        run: |
          timeout 120 sh -c \
            'until docker compose exec -T neo4j wget -q --spider http://localhost:7474 2>/dev/null; \
             do sleep 3; done'

      - run: >
          pytest tests/test_smoke_index_core.py tests/test_smoke_pattern_wow.py
          tests/test_smoke_product_wow.py -v -m smoke --tb=short
        env:
          NEO4J_TEST_URI: bolt://localhost:7687
          NEO4J_TEST_USER: neo4j
          NEO4J_TEST_PASSWORD: password

  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Start PostgreSQL
        run: |
          cp .env.example .env
          docker compose up -d postgres

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: playwright install chromium --with-deps

      - name: Wait for PostgreSQL
        run: |
          timeout 60 sh -c \
            'until docker compose exec -T postgres pg_isready -U odoo_semantic 2>/dev/null; \
             do sleep 2; done'

      - run: pytest tests/test_web_ui_browser.py -v -m "browser and postgres" --tb=short
        env:
          PG_TEST_DSN: postgresql://odoo_semantic:password@localhost:5432/odoo_semantic
