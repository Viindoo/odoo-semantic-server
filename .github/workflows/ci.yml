# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v -m "not neo4j" --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    # Không dùng service container — testcontainers tự spin up Neo4j qua Docker
    # (ubuntu-latest runner có Docker sẵn)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v -m "neo4j" --tb=short
        env:
          # Tắt Ryuk (resource reaper) để tránh flakiness trong CI
          TESTCONTAINERS_RYUK_DISABLED: "true"
