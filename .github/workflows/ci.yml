# .github/workflows/ci.yml
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Single source of truth for DB image versions:
#   Neo4j  — NEO4J_IMAGE in .env.example (docker-compose reads via ${NEO4J_IMAGE})
#   Postgres — image hardcoded in docker-compose.yml
# All jobs use `docker compose up -d` so no version is duplicated here.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"
          enable-cache: true
      # `--locked` fails if uv.lock drifted from pyproject.toml (issue #319 drift guard).
      - run: uv sync --locked --extra dev
      - run: uv lock --check
      - run: uv run ruff check src/ tests/
      - run: bash scripts/lint_json_response.sh
      - run: bash scripts/lint_fetch_content_type.sh

  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Run actionlint
        run: ${{ steps.get_actionlint.outputs.executable }} -color

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"
          enable-cache: true
      - run: uv sync --locked --extra dev
      - name: Validate patterns.json schema
        run: uv run check-jsonschema --schemafile src/data/patterns.schema.json src/data/patterns.json
      - run: uv run pytest tests/ -v -m "not neo4j and not postgres and not browser" --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    # Workflow-level env so `docker compose up` and pytest see the same passwords.
    # `.env.example` ships passwords blank ("bắt buộc điền") — CI must supply them.
    env:
      NEO4J_PASSWORD: password
      PG_PASSWORD: password
      # Use 127.0.0.1 (IPv4) — ubuntu-latest resolves "localhost" to ::1 (IPv6)
      # but docker-compose port mapping is "127.0.0.1:5432:5432" (IPv4 only).
      # Same applies to Neo4j Bolt :7687.
      NEO4J_TEST_URI: bolt://127.0.0.1:7687
      NEO4J_TEST_USER: neo4j
      NEO4J_TEST_PASSWORD: password
      # PG_ADMIN_DSN: superuser maintenance-DB connection used by conftest to
      # CREATE/DROP ephemeral test databases (osm_test_<uuid>).
      # POSTGRES_USER (odoo_semantic) is created as superuser by the Postgres
      # Docker entrypoint, so it has CREATEDB. Maintenance DB is "postgres"
      # (always exists). conftest._ephemeral_pg_db derives the test DSN from
      # this by substituting the db-name — no hardcoded "odoo_semantic" DB needed.
      PG_ADMIN_DSN: postgresql://odoo_semantic:password@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v6

      # Free port 5432 in case ubuntu-latest runner has system PostgreSQL active.
      - name: Stop system PostgreSQL (free port 5432)
        run: sudo systemctl stop postgresql || true

      # `docker compose up --wait` blocks until each service passes its healthcheck:
      #   - Neo4j: `cypher-shell 'RETURN 1'` (tests Bolt :7687 — what the driver actually uses)
      #   - Postgres: `pg_isready -U odoo_semantic`
      # Replaces the previous separate wait steps that probed wrong signals
      # (Neo4j HTTP :7474 ready ≠ Bolt ready) and caused 303 silent skips.
      - name: Start DB services and wait until healthy
        run: |
          cp .env.example .env
          docker compose up -d --wait --wait-timeout 120

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"
          enable-cache: true
      - run: uv sync --locked --extra dev

      # `-rs` shows skip reasons in pytest summary — silent skips were how the
      # previous CI breakage went unnoticed.
      - run: uv run pytest tests/ -v -rs -m "(neo4j or postgres) and not smoke and not browser" --tb=short

  smoke-tests:
    runs-on: ubuntu-latest
    env:
      NEO4J_PASSWORD: password
      NEO4J_TEST_URI: bolt://127.0.0.1:7687
      NEO4J_TEST_USER: neo4j
      NEO4J_TEST_PASSWORD: password
    steps:
      - uses: actions/checkout@v6

      - name: Start Neo4j and wait until healthy
        run: |
          cp .env.example .env
          docker compose up -d neo4j --wait --wait-timeout 120

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"
          enable-cache: true
      - run: uv sync --locked --extra dev

      - run: >
          uv run pytest tests/test_smoke_index_core.py tests/test_smoke_pattern_wow.py
          tests/test_smoke_product_wow.py -v -rs -m smoke --tb=short

  browser-tests-admin:
    # Admin browser tests — require Postgres + FastAPI api_server + Astro preview
    # Time budget: ≤20 min (70+ tests × ~15s each with Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PG_PASSWORD: password
      # PG_ADMIN_DSN: superuser maintenance-DB connection used by conftest to
      # CREATE/DROP ephemeral test databases (osm_test_<uuid>).
      # POSTGRES_USER (odoo_semantic) is created as superuser by the Postgres
      # Docker entrypoint, so it has CREATEDB. Maintenance DB is "postgres"
      # (always exists). conftest._ephemeral_pg_db derives the test DSN from
      # this by substituting the db-name — no hardcoded "odoo_semantic" DB needed.
      PG_ADMIN_DSN: postgresql://odoo_semantic:password@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v6

      - name: Stop system PostgreSQL (free port 5432)
        run: sudo systemctl stop postgresql || true

      - name: Start PostgreSQL and wait until healthy
        run: |
          cp .env.example .env
          docker compose up -d postgres --wait --wait-timeout 60

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run playwright install chromium --with-deps

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install Astro dependencies
        run: pnpm install --frozen-lockfile
        working-directory: site

      - name: Build Astro site (dev mode — sets ASTRO_DEV_ORIGIN so checkOrigin allows 127.0.0.1)
        run: pnpm build:dev
        working-directory: site

      - name: Run admin browser tests
        run: uv run pytest tests/browser/admin/ -v -rs -m "browser and postgres" --tb=short

  browser-tests-public:
    # Public browser tests — require only Astro preview (no Postgres, no FastAPI)
    # Time budget: ≤2 min
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run playwright install chromium --with-deps

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install Astro dependencies
        run: pnpm install --frozen-lockfile
        working-directory: site

      - name: Type-check Astro (astro check)
        run: pnpm check
        working-directory: site

      - name: Build Astro site (dev mode — sets ASTRO_DEV_ORIGIN so checkOrigin allows 127.0.0.1)
        run: pnpm build:dev
        working-directory: site

      - name: Run public browser tests
        run: uv run pytest tests/browser/public/ -v -rs -m browser --tb=short
