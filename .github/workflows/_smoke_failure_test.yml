# _smoke_failure_test.yml — TEMPORARY workflow for failure-path verification (C4)
# This workflow deliberately fails to verify issue auto-creation works.
# WILL BE DELETED in the revert commit after verifying issue creation.
name: Smoke Failure Path Test (temp)

on:
  workflow_dispatch: {}

jobs:
  deliberate-fail:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26.25
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # Deliberately fail: assert an impossible threshold
      - name: Deliberate failure for C4 verification
        run: |
          python -c "
          assert False, 'Deliberate C4 failure — verifying issue auto-creation works'
          "

  report-failure:
    needs: [deliberate-fail]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create GitHub issue on smoke failure
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[C4-TEST] Nightly smoke fail ${today}`,
              body:
                `**This issue was created by the C4 failure-path verification test.**\n\n` +
                `It confirms that the nightly-smoke.yml auto-issue creation works.\n` +
                `This issue and the \_smoke\_failure\_test.yml workflow will be deleted ` +
                `in the revert commit.\n\n` +
                `**Run**: ${runUrl}`,
              labels: ['nightly-smoke', 'bug', 'priority:high'],
            });
