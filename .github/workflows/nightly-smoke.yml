# .github/workflows/nightly-smoke.yml
# Nightly smoke against real Odoo upstream sources (v17 + v8).
#
# ── IMAGE VERSION SYNC ────────────────────────────────────────────────
# Nguồn sự thật: NEO4J_IMAGE và PG_IMAGE trong .env.example (repo root).
# GitHub Actions service containers được khởi động TRƯỚC bất kỳ step nào —
# không thể đọc .env.example lúc parse time → phải hardcode ở đây.
# Khi bump NEO4J_IMAGE hoặc PG_IMAGE trong .env.example:
#   1. Cập nhật services.neo4j.image trong CẢ HAI job (smoke-real-odoo-17 + smoke-real-odoo-8)
#   2. Cập nhật services.postgres.image trong CẢ HAI job
# tests/test_env_versions_sync.py sẽ fail CI nếu .env.example và file này bị lệch.
# ─────────────────────────────────────────────────────────────────────
# Catches B1 indexer-wiring regressions and Phase-0 ManifestFinder / era1 regressions.
#
# Schedule: 19:00 UTC = 02:00 Vietnam time (GitHub least-busy window).
# On failure: auto-creates a GitHub issue with labels [nightly-smoke, bug, priority:high].
# Manual trigger: gh workflow run nightly-smoke.yml [-r <branch>]

name: Nightly Real-Source Smoke

permissions:
  contents: read

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch: {}

jobs:
  smoke-real-odoo-17:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26.25
        env:
          NEO4J_AUTH: neo4j/password
          # Mirror docker-compose.yml NEO4J_db_transaction_timeout (ADR-0048 D7 / #276).
          # Actions parse services before any step, so this must be hardcoded here.
          NEO4J_db_transaction_timeout: "600s"
        ports:
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      postgres:
        image: pgvector/pgvector:0.8.2-pg16
        env:
          POSTGRES_DB: odoo_semantic
          POSTGRES_USER: odoo_semantic
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.8"
          enable-cache: true
      - run: uv sync --locked --extra dev
      # Put the uv-managed venv on PATH so the many bare `python`/`pytest` steps
      # below resolve to the locked interpreter without an `uv run` prefix each.
      - run: echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"

      - name: Bootstrap PostgreSQL schema
        run: python -m src.db.migrate
        env:
          PG_DSN: postgresql://odoo_semantic:password@localhost:5432/odoo_semantic

      - name: "Neo4j backstop runtime test — db.transaction.timeout=600s (ADR-0048 D7 / #276)"
        # Opts into the integration path of test_compose_neo4j_backstop.py.
        # The service container above is started with NEO4J_db_transaction_timeout=600s;
        # NEO4J_COMPOSE_BACKSTOP_TEST=1 un-skips the SHOW SETTINGS assertion that verifies
        # the env-name -> Neo4j config mapping works at runtime (static YAML parsing alone
        # cannot cover this). This is the only place in CI where this test runs live.
        run: pytest tests/test_compose_neo4j_backstop.py -v -rs
        env:
          CI: "true"
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          NEO4J_COMPOSE_BACKSTOP_TEST: "1"

      - name: Clone Odoo 17 (shallow, depth=1)
        run: |
          git clone --depth=1 -b 17.0 https://github.com/odoo/odoo /tmp/odoo_17.0
          du -sh /tmp/odoo_17.0

      - name: Smoke v17 — index-core (CoreSymbol + LintRule + CLICommand + CLIFlag)
        id: smoke_v17_core
        run: |
          python -m src.indexer index-core \
            --source /tmp/odoo_17.0 \
            --version 17.0 \
            2>&1 | tee /tmp/index-core-17.log
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          PG_DSN: postgresql://odoo_semantic:password@localhost:5432/odoo_semantic

      - name: Smoke v17 — verify Neo4j counts against B1 thresholds
        run: |
          python - <<'PYEOF'
          from neo4j import GraphDatabase
          driver = GraphDatabase.driver(
              'bolt://localhost:7687', auth=('neo4j', 'password')
          )
          with driver.session() as s:
              cs = s.run(
                  "MATCH (cs:CoreSymbol {odoo_version:'17.0'}) RETURN count(cs) AS c"
              ).single()['c']
              lr = s.run(
                  "MATCH (lr:LintRule {odoo_version:'17.0'}) RETURN count(lr) AS c"
              ).single()['c']
              cc = s.run(
                  "MATCH (cc:CLICommand {odoo_version:'17.0'}) RETURN count(cc) AS c"
              ).single()['c']
              cf = s.run(
                  "MATCH (cf:CLIFlag {odoo_version:'17.0'}) RETURN count(cf) AS c"
              ).single()['c']
          driver.close()
          print(f'v17 counts: CoreSymbol={cs} LintRule={lr} CLICommand={cc} CLIFlag={cf}')
          assert cs >= 400, f'CoreSymbol {cs} < 400 — B1 regression? Check allow-list parsing'
          assert lr >= 10, f'LintRule {lr} < 10 — B1 regression? Check lint rule extraction'
          assert cc >= 10, f'CLICommand {cc} < 10 — B1 regression? Check odoo/cli/*.py parse'
          assert cf >= 50, f'CLIFlag {cf} < 50 — B1 regression? Check odoo/tools/config.py parse'
          print('v17 smoke PASS')
          PYEOF

      - name: "ORM read smoke — per-hop name-dedup regression guard (ADR-0048)"
        # Regression guard for #273: the inherited-field fallback
        # (orm_queries.py _lookup_field step-3) must complete under a wall-clock bound on a dense
        # graph that reproduces the EXACT condition that made the old VLP query hang.
        #
        # Two design requirements (H2 — the previous version could not fail):
        #   (1) The resolved field lives on a SEPARATE mixin model with NO direct
        #       Field row under 'smoke.order'. So step-1 (direct) and step-2 (magic)
        #       both miss and the resolution is forced through step-3 (inherited).
        #       Topology: smoke.order(def) -INHERITS-> smoke.mixin(def) which carries
        #       the amount_total Field. A reverted step-3 => BROKEN/missing => FAIL.
        #   (2) The same-name extenders are wired as the FULL K*(K-1) mesh (each
        #       extender -> every OTHER same-name node), simulating production data
        #       that has NOT yet been cleaned by the mesh-cleanup script. On this
        #       mesh the old VLP `*1..N` + ORDER-BY-before-LIMIT enumerates
        #       ~K*(K-1)*... paths and blows the wall-clock bound; the per-hop
        #       name-dedup collapses it to <=N distinct names and stays fast.
        #
        # index-core does NOT produce Model/Field nodes (only CoreSymbol/LintRule/
        # CLICommand/CLIFlag), so this synthetic dense graph is the correct vehicle.
        run: |
          timeout 120 python - <<'PYEOF'
          import time, os
          from neo4j import GraphDatabase

          NEO4J_URI = 'bolt://localhost:7687'
          NEO4J_AUTH = ('neo4j', 'password')
          TEST_VERSION = '99.8'  # dedicated version avoids collision with index-core data
          # K=140 -> K*(K-1)=19460 mesh edges if un-cleaned. Sized so a revert to
          # the old VLP all-K shape blows the 10s bound by a wide margin (VLP cost
          # grows ~K^3 at depth 3; K=60 measured only ~2.3s and would slip under
          # the tripwire), while the per-hop query stays sub-second.
          K = 140

          driver = GraphDatabase.driver(NEO4J_URI, auth=NEO4J_AUTH)

          with driver.session() as s:
              # Clean any prior run of this version (idempotent CI).
              s.run('MATCH (n {odoo_version:$v}) DETACH DELETE n', v=TEST_VERSION)
              # smoke.order definition + K-1 same-name extenders.
              s.run(
                  'MERGE (m:Model {name:"smoke.order", module:"smoke_base", '
                  '       odoo_version:$v, is_definition:true, field_count:5, '
                  '       had_explicit_name:true, profile:["__global__"]})',
                  v=TEST_VERSION
              )
              for i in range(K - 1):
                  s.run(
                      'MERGE (m:Model {name:"smoke.order", module:$mod, '
                      '       odoo_version:$v, is_definition:false, field_count:0, '
                      '       had_explicit_name:true, profile:["__global__"]})',
                      mod=f'smoke_ext_{i}', v=TEST_VERSION
                  )
              # FULL K*(K-1) same-name mesh (un-cleaned prod shape): every
              # same-name node INHERITS every OTHER same-name node.
              s.run(
                  'MATCH (a:Model {name:"smoke.order", odoo_version:$v}), '
                  '      (b:Model {name:"smoke.order", odoo_version:$v}) '
                  'WHERE a.module <> b.module '
                  'MERGE (a)-[:INHERITS {order:0}]->(b)',
                  v=TEST_VERSION
              )
              mesh = s.run(
                  'MATCH (a:Model {name:"smoke.order", odoo_version:$v}) '
                  '-[r:INHERITS]->(b:Model {name:"smoke.order", odoo_version:$v}) '
                  'RETURN count(r) AS c', v=TEST_VERSION
              ).single()['c']
              # Separate mixin model that actually OWNS the field; the definition
              # INHERITS it. amount_total has NO direct Field under smoke.order, so
              # only step-3 (inherited) can resolve it.
              s.run(
                  'MERGE (mx:Model {name:"smoke.mixin", module:"smoke_base", '
                  '       odoo_version:$v, is_definition:true, field_count:1, '
                  '       had_explicit_name:true, profile:["__global__"]})',
                  v=TEST_VERSION
              )
              s.run(
                  'MATCH (def:Model {name:"smoke.order", odoo_version:$v, is_definition:true}), '
                  '      (mx:Model {name:"smoke.mixin", odoo_version:$v}) '
                  'MERGE (def)-[:INHERITS {order:0}]->(mx)',
                  v=TEST_VERSION
              )
              s.run(
                  'MERGE (f:Field {name:"amount_total", model:"smoke.mixin", '
                  '       module:"smoke_base", odoo_version:$v, ttype:"monetary", '
                  '       profile:["__global__"]})',
                  v=TEST_VERSION
              )
              # Assert there is NO direct Field under smoke.order (so step-1 cannot answer).
              direct = s.run(
                  'MATCH (f:Field {name:"amount_total", model:"smoke.order", '
                  '       odoo_version:$v}) RETURN count(f) AS c', v=TEST_VERSION
              ).single()['c']
              assert direct == 0, 'amount_total must NOT be a direct field on smoke.order'
              # Relational self-referential field for the validate_relation MISMATCH
              # smoke (step below): a many2one whose comodel IS smoke.order (the
              # K=140 mesh). A MISMATCH check (target != comodel) then anchors the
              # 5-hop INHERITS subtype traversal on ALL K same-name nodes and must
              # exhaust them fast — the genuine exhaustive-negative end-to-end the
              # reviewer asked the smoke to exercise (a non-relational field would
              # exit early at the 'not relational' branch and never reach the 5 hops).
              s.run(
                  'MERGE (f:Field {name:"parent_id", model:"smoke.order", '
                  '       module:"smoke_base", odoo_version:$v, ttype:"many2one", '
                  '       comodel_name:"smoke.order", profile:["__global__"]})',
                  v=TEST_VERSION
              )
          print(f'Seeded: K={K} same-name nodes, {mesh} mesh edges, field on smoke.mixin only')

          os.environ.setdefault('NEO4J_URI', NEO4J_URI)
          os.environ.setdefault('NEO4J_USER', 'neo4j')
          os.environ.setdefault('NEO4J_PASSWORD', 'password')
          os.environ.setdefault('PG_DSN', 'postgresql://odoo_semantic:password@localhost:5432/odoo_semantic')

          from src.mcp.orm_validators import _resolve_orm_chain
          from src.mcp.orm_queries import _lookup_field
          from src.mcp import server as srv

          # (A) Direct step-3 assertion: source must be 'inherited' (NOT 'direct').
          with srv._get_driver().session() as s:
              info = _lookup_field('smoke.order', 'amount_total', TEST_VERSION, s)
          assert info is not None, 'step-3 inherited fallback returned None — regression'
          assert info['source'] == 'inherited', (
              f"expected source=='inherited' (field lives on mixin), got {info!r} — "
              'regression: step-3 per-hop fallback broken or field became direct.'
          )
          print(f'_lookup_field source = {info["source"]} (correct: resolved via step-3)')

          # (B) End-to-end rendered chain under a wall-clock bound on the mesh.
          t0 = time.monotonic()
          result = _resolve_orm_chain('smoke.order', 'amount_total', TEST_VERSION)
          elapsed = time.monotonic() - t0
          print(f'_resolve_orm_chain result (elapsed {elapsed:.2f}s):')
          print(result)

          assert elapsed < 10, (
              f'_resolve_orm_chain took {elapsed:.1f}s > 10s bound on the K*(K-1) mesh — '
              'regression to VLP all-K or ORDER BY before LIMIT. '
              'Check orm_queries.py _lookup_field step-3 per-hop name-dedup.'
          )
          assert 'smoke.order.amount_total' in result, f'Field not found in result: {result!r}'
          assert 'BROKEN' not in result, f'Unexpected BROKEN in result: {result!r}'
          print(f'ORM read smoke PASS (source=inherited, elapsed {elapsed:.2f}s < 10s bound)')
          PYEOF
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          PG_DSN: postgresql://odoo_semantic:password@localhost:5432/odoo_semantic

      - name: "LintRule code_pattern smoke — W8140 SQL injection pattern present (ADR-0048 D9)"
        # Regression guard for #271: after index-core v17 (step smoke_v17_core above),
        # LintRule nodes for W8140 must have a non-null code_pattern.
        # NOTE: LintRule nodes come ONLY from index-core (not index-repo). The preceding
        # smoke_v17_core step guarantees they are present before this assertion runs.
        run: |
          python - <<'PYEOF'
          from neo4j import GraphDatabase
          driver = GraphDatabase.driver('bolt://localhost:7687', auth=('neo4j', 'password'))
          with driver.session() as s:
              row = s.run(
                  'MATCH (lr:LintRule {rule_id:"W8140", odoo_version:"17.0"}) '
                  'RETURN lr.code_pattern AS cp LIMIT 1'
              ).single()
          driver.close()
          assert row is not None, (
              'W8140 LintRule MISSING in 17.0 after index-core — regression: '
              'lint_rules_17.0.json guarantees this rule is seeded. A missing rule '
              'would silently drop SQL-injection detection, so this is a hard FAIL '
              '(not a SKIP).'
          )
          cp = row['cp']
          assert cp is not None and len(cp) > 0, (
              f'W8140 code_pattern is null/empty: {cp!r} — '
              '#271 regression: static JSON patterns not being written to Neo4j. '
              'Check _apply_code_patterns_overlay + writer SET l.code_pattern.'
          )
          print(f'W8140 code_pattern present: {cp!r}')
          print('LintRule code_pattern smoke PASS')
          PYEOF
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          PG_DSN: postgresql://odoo_semantic:password@localhost:5432/odoo_semantic

      - name: "ORM validate_relation MISMATCH smoke — K² mesh + K×D post-cleanup regression (ADR-0048 D8)"
        # Two complementary guards on the SAME synthetic K=140 mesh seeded by
        # the "ORM read smoke" step above (TEST_VERSION='99.8' reused):
        #
        # (A) validate_relation MISMATCH on un-cleaned K² mesh:
        #     The interim deploy window has new code running against old K² data.
        #     A MISMATCH query (nonexistent comodel) must NOT time out — it should
        #     return a fast "not found" result within the 10s wall-clock bound.
        #     This covers the TEST GAP noted by reviewer (#7 inline findings).
        #
        # (B) K×D post-cleanup regression:
        #     Run the cleanup Phase1+Phase2 Cypher statements on the K² mesh, then
        #     verify resolve_orm_chain still resolves amount_total correctly (K×D
        #     data shape matches what prod will have post-cleanup). This smoke-tests
        #     the cleanup script logic itself in CI.
        run: |
          timeout 120 python - <<'PYEOF'
          import time, os
          from neo4j import GraphDatabase

          NEO4J_URI = 'bolt://localhost:7687'
          NEO4J_AUTH = ('neo4j', 'password')
          TEST_VERSION = '99.8'  # same as ORM read smoke step above

          driver = GraphDatabase.driver(NEO4J_URI, auth=NEO4J_AUTH)

          os.environ.setdefault('NEO4J_URI', NEO4J_URI)
          os.environ.setdefault('NEO4J_USER', 'neo4j')
          os.environ.setdefault('NEO4J_PASSWORD', 'password')
          os.environ.setdefault('PG_DSN', 'postgresql://odoo_semantic:password@localhost:5432/odoo_semantic')

          from src.mcp.orm_validators import _validate_relation
          from src.mcp import server as srv

          # (A) validate_relation MISMATCH on K² mesh: smoke.order.parent_id is a
          # many2one whose comodel is smoke.order itself (the K=140 mesh). A target
          # of 'nonexistent.model' (!= the comodel) forces the 5-hop INHERITS
          # subtype traversal to run the EXHAUSTIVE-NEGATIVE search anchored on all
          # K same-name comodel nodes, then return MISMATCH. On the old VLP all-K
          # query this would exhaust ~19460 mesh edges and time out; the per-hop
          # name-dedup collapses it to <=N names. (A non-relational field would
          # exit at the 'not relational' branch and never reach the 5 hops.)
          t0 = time.monotonic()
          result_mismatch = _validate_relation(
              'smoke.order', 'parent_id', 'nonexistent.model', TEST_VERSION
          )
          elapsed_mismatch = time.monotonic() - t0
          print(f'validate_relation MISMATCH elapsed {elapsed_mismatch:.2f}s: {result_mismatch!r}')
          assert elapsed_mismatch < 10, (
              f'validate_relation MISMATCH took {elapsed_mismatch:.1f}s > 10s on K² mesh — '
              'regression to VLP all-K traversal. Check orm_validators.py _validate_relation per-hop dedup.'
          )
          # Lock in that we actually exercised the 5-hop subtype check (relational
          # field), not the 'not relational' early exit that a monetary field hit.
          assert 'MISMATCH' in result_mismatch and 'not a relational' not in result_mismatch, (
              'expected a relational MISMATCH that ran the 5-hop subtype traversal, '
              f'got: {result_mismatch!r}'
          )
          print(f'validate_relation MISMATCH smoke PASS ({elapsed_mismatch:.2f}s < 10s)')

          # (B) Post-cleanup K×D regression: run the REAL ops cleanup script on the
          # mesh, then verify resolve_orm_chain still works with K×D topology.
          #
          # F1 (smoke-copy drift fix): the smoke used to copy the Phase 1 BACKFILL +
          # Phase 2 DELETE Cypher inline (scoped to $v). That copy drifted from the
          # production script and was the root of bug #3. The smoke now READS and RUNS
          # the actual ops/cleanup_same_name_inherits_mesh.cypher so it always tests
          # the code that prod runs — drift is structurally impossible.
          #
          # The ops script is GLOBAL (NOT version-scoped). A SAFETY GUARD below asserts
          # the DB contains Model nodes at TEST_VERSION only before running it. On a
          # fresh CI service-container DB that holds true (this job seeds only its own
          # TEST_VERSION synthetic data plus index-core CoreSymbol/LintRule/CLICommand/
          # CLIFlag nodes, none of which are :Model); the guard protects against
          # accidentally wiping a non-fresh DB if this step is ever run elsewhere.
          cypher_text = open('ops/cleanup_same_name_inherits_mesh.cypher').read()
          # Strip `//` comment lines, then split the runnable body on `;`. The ops file
          # has exactly two runnable statements (Phase 1 backfill MERGE, Phase 2 delete);
          # Phase 0 / DIAGNOSE / VERIFY are commented-out and drop out here.
          code_lines = [
              ln for ln in cypher_text.splitlines() if not ln.strip().startswith('//')
          ]
          statements = [
              stmt.strip()
              for stmt in '\n'.join(code_lines).split(';')
              if stmt.strip()
          ]
          assert len(statements) == 2, (
              f'expected exactly 2 runnable statements in the ops cleanup script '
              f'(Phase 1 backfill + Phase 2 delete), parsed {len(statements)} — '
              'the script shape changed; update this smoke parse + guard.'
          )

          with driver.session() as s:
              # SAFETY GUARD (mandatory): the ops script is GLOBAL (no version scope).
              # Refuse to run it unless every :Model node is at TEST_VERSION, so the
              # smoke can never touch real data on a non-fresh DB.
              foreign = s.run(
                  'MATCH (m:Model) WHERE m.odoo_version <> $v RETURN count(m) AS c',
                  v=TEST_VERSION
              ).single()['c']
              assert foreign == 0, (
                  f'Refusing to run GLOBAL cleanup: {foreign} Model nodes at other '
                  'versions exist (ops script is not version-scoped; smoke must run on '
                  'a DB containing only its TEST_VERSION synthetic data)'
              )
              # Run the REAL ops statements. They use CALL ... IN TRANSACTIONS, which
              # requires an implicit (auto-commit) transaction — drive each via a bare
              # session.run (NOT execute_write / an explicit managed transaction).
              for stmt in statements:
                  s.run(stmt)
              # Count ONLY same-name-to-NON-definition mesh edges (the set Phase 2
              # removes). The K×D extender->definition edges are KEPT by design
              # (ADR-0048: cleanup collapses the K*(K-1) mesh to K×D extender->
              # definition, it does not delete those), so counting ALL
              # smoke.order->smoke.order edges would include the ~K legit kept edges
              # and never reach 0. Mirror Phase 2's `NOT b.is_definition` filter.
              mesh_after = s.run(
                  'MATCH (a:Model {name:"smoke.order", odoo_version:$v})'
                  '-[r:INHERITS]->(b:Model {name:"smoke.order", odoo_version:$v})'
                  ' WHERE NOT coalesce(b.is_definition, false)'
                  ' RETURN count(r) AS c', v=TEST_VERSION
              ).single()['c']
          print(f'Post-cleanup same-name->non-definition mesh edges: {mesh_after} (expected 0)')
          assert mesh_after == 0, (
              f'Cleanup left {mesh_after} same-name->non-definition mesh edges '
              '(Phase 2 should remove all of them; K×D extender->definition edges '
              'are kept and counted separately)'
          )

          # Verify ORM resolution still works on K×D topology
          from src.mcp.orm_validators import _resolve_orm_chain
          t0 = time.monotonic()
          result_kd = _resolve_orm_chain('smoke.order', 'amount_total', TEST_VERSION)
          elapsed_kd = time.monotonic() - t0
          print(f'K×D resolve_orm_chain elapsed {elapsed_kd:.2f}s')
          assert elapsed_kd < 5, (
              f'resolve_orm_chain took {elapsed_kd:.1f}s > 5s on K×D topology — '
              'unexpected regression after cleanup.'
          )
          assert 'smoke.order.amount_total' in result_kd, (
              f'Field not resolved on K×D topology: {result_kd!r}'
          )
          assert 'BROKEN' not in result_kd, f'BROKEN in K×D result: {result_kd!r}'
          print(f'K×D post-cleanup smoke PASS (elapsed {elapsed_kd:.2f}s)')
          PYEOF
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          PG_DSN: postgresql://odoo_semantic:password@localhost:5432/odoo_semantic

      - name: "Astro smoke — landing page GET /"
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://odoo-semantic.viindoo.com/ 2>/dev/null || true)
          echo "Landing page status: $status"
          [ "$status" = "200" ] || (echo "Expected 200, got $status" && exit 1)

      - name: "Astro smoke — canonical login page GET /login"
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://odoo-semantic.viindoo.com/login 2>/dev/null || true)
          echo "Login page status: $status"
          [ "$status" = "200" ] || (echo "Expected 200, got $status" && exit 1)

      - name: "Astro smoke — /admin/login 301 redirect"
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://odoo-semantic.viindoo.com/admin/login 2>/dev/null || true)
          echo "Admin login redirect status: $status"
          [ "$status" = "301" ] || (echo "Expected 301 permanent redirect, got $status" && exit 1)

      - name: "FastAPI JSON smoke — GET /api/auth/verify (expect 401 no cookie)"
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://odoo-semantic.viindoo.com/api/auth/verify 2>/dev/null || true)
          echo "FastAPI auth verify status: $status"
          [ "$status" = "401" ] || (echo "Expected 401 no cookie, got $status" && exit 1)

  smoke-real-odoo-8:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26.25
        env:
          NEO4J_AUTH: neo4j/password
          # Mirror docker-compose.yml NEO4J_db_transaction_timeout (ADR-0048 D7 / #276).
          # Actions parse services before any step, so this must be hardcoded here.
          NEO4J_db_transaction_timeout: "600s"
        ports:
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      postgres:
        image: pgvector/pgvector:0.8.2-pg16
        env:
          POSTGRES_DB: odoo_semantic
          POSTGRES_USER: odoo_semantic
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.8"
          enable-cache: true
      - run: uv sync --locked --extra dev
      # Put the uv-managed venv on PATH so the many bare `python`/`pytest` steps
      # below resolve to the locked interpreter without an `uv run` prefix each.
      - run: echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"

      - name: Bootstrap PostgreSQL schema
        run: python -m src.db.migrate
        env:
          PG_DSN: postgresql://odoo_semantic:password@localhost:5432/odoo_semantic

      - name: Clone Odoo 8 (shallow, depth=1) into server-managed path
        run: |
          CLONE_DIR="$HOME/.local/share/odoo-semantic-mcp/clones/odoo8/odoo"
          mkdir -p "$(dirname "$CLONE_DIR")"
          git clone --depth=1 -b 8.0 https://github.com/odoo/odoo "$CLONE_DIR"
          du -sh "$CLONE_DIR"

      - name: Register profile + repo for Odoo 8
        run: |
          python -m src.manager add-profile odoo8 --version 8.0
          python -m src.manager add-repo \
            --profile odoo8 \
            --url https://github.com/odoo/odoo \
            --branch 8.0
        env:
          PG_DSN: postgresql://odoo_semantic:password@localhost:5432/odoo_semantic

      - name: Smoke v8 — index-repo (Phase-0 ManifestFinder + era1 parser)
        run: |
          python -m src.indexer index-repo --profile odoo8 --no-embed \
            2>&1 | tee /tmp/index-v8.log
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          PG_DSN: postgresql://odoo_semantic:password@localhost:5432/odoo_semantic

      - name: Smoke v8 — verify Module + Model + Method counts (Phase-0 + WI-F5)
        run: |
          python - <<'PYEOF'
          from neo4j import GraphDatabase
          driver = GraphDatabase.driver(
              'bolt://localhost:7687', auth=('neo4j', 'password')
          )
          with driver.session() as s:
              modules = s.run(
                  "MATCH (m:Module {odoo_version:'8.0'}) RETURN count(m) AS c"
              ).single()['c']
              models = s.run(
                  "MATCH (m:Model {odoo_version:'8.0'}) RETURN count(m) AS c"
              ).single()['c']
              methods = s.run(
                  "MATCH (m:Method {odoo_version:'8.0'}) RETURN count(m) AS c"
              ).single()['c']
          driver.close()
          print(f'v8 counts: Module={modules} Model={models} Method={methods}')
          assert modules >= 100, (
              f'Module {modules} < 100 — Phase-0 ManifestFinder regression? '
              'Check LegacyManifestFinder (__openerp__.py detection)'
          )
          assert models > 0, (
              f'Model {models} = 0 — era1 _columns extract regression? '
              'Check parser_python era1 path'
          )
          assert methods > 0, (
              f'Method {methods} = 0 — WI-F5 era1 method extract regression? '
              'Check parser_python era1 method extraction'
          )
          print('v8 smoke PASS')
          PYEOF

  check-ollama:
    # Lightweight gate job: checks whether OLLAMA_URL secret is set and exposes
    # an output `enabled` so downstream jobs can use `needs` context (secrets
    # are NOT available in job-level `if:` expressions — only step-level).
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ -n "$OLLAMA_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}

  recall-benchmark:
    # Nightly Ollama-gated recall benchmark.
    # Skipped automatically when OLLAMA_URL secret is not set.
    # Enforces: VN recall@5 >= 0.75, EN recall@5 >= 0.80, gap(EN-VN) <= 0.05.
    #
    # IMAGE VERSION NOTE: hardcoded below to match .env.example (NEO4J_IMAGE + PG_IMAGE).
    # Keep in sync when bumping .env.example — same rule as the smoke jobs above.
    needs: check-ollama
    if: needs.check-ollama.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26.25
        env:
          NEO4J_AUTH: neo4j/password
          # Mirror docker-compose.yml NEO4J_db_transaction_timeout (ADR-0048 D7 / #276).
          # Actions parse services before any step, so this must be hardcoded here.
          NEO4J_db_transaction_timeout: "600s"
        ports:
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      postgres:
        image: pgvector/pgvector:0.8.2-pg16
        env:
          POSTGRES_DB: odoo_semantic
          POSTGRES_USER: odoo_semantic
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.8"
          enable-cache: true
      - run: uv sync --locked --extra dev
      # Put the uv-managed venv on PATH so the many bare `python`/`pytest` steps
      # below resolve to the locked interpreter without an `uv run` prefix each.
      - run: echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"

      - name: Bootstrap PostgreSQL schema
        run: python -m src.db.migrate
        env:
          PG_DSN: postgresql://odoo_semantic:password@127.0.0.1:5432/odoo_semantic

      - name: Run Ollama-gated recall benchmark
        run: pytest tests/test_find_examples_recall.py -m ollama -v
        env:
          CI: "true"
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          PG_DSN: postgresql://odoo_semantic:password@127.0.0.1:5432/odoo_semantic
          # OLLAMA_URL and OLLAMA_MODEL forwarded from repository secrets
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}

  report-failure:
    needs: [smoke-real-odoo-17, smoke-real-odoo-8, check-ollama, recall-benchmark]
    # Run when any needed job failed (ignore recall-benchmark when skipped), but
    # ONLY for the scheduled nightly — a manual `workflow_dispatch` verify-run that
    # fails (e.g. while iterating a fix on a branch) must NOT auto-file a noise issue
    # (this is what created the spurious #309).
    if: always() && github.event_name == 'schedule' && (needs.smoke-real-odoo-17.result == 'failure' || needs.smoke-real-odoo-8.result == 'failure' || needs.recall-benchmark.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create GitHub issue on smoke failure
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly smoke fail ${today}`,
              body:
                `Nightly smoke against real Odoo 17 + Odoo 8 sources failed.\n\n` +
                `**Run**: ${runUrl}\n\n` +
                `Check the workflow logs to identify which assertion failed.\n\n` +
                `**Possible regressions:**\n` +
                `- B1 indexer wiring: CoreSymbol/LintRule/CLICommand/CLIFlag counts < threshold\n` +
                `- Phase-0 ManifestFinder: v8 Module count = 0 (LegacyManifestFinder broken)\n` +
                `- WI-F5 era1 method extract: v8 Method count = 0\n` +
                `- Upstream Odoo schema drift: file rename, allow-list outdated\n\n` +
                `Assign to the engineer who last modified \`src/indexer/\`.`,
              labels: ['nightly-smoke', 'bug', 'priority:high'],
            });
