[project]
name = "osm"
version = "0.0.0"
description = "Graph + vector index of Odoo codebases, served over MCP"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "Proprietary" }
authors = [
    { name = "osm maintainers" },
]
dependencies = [
    "psycopg[binary]>=3.1",
    "libcst>=1.1",
    "pydantic>=2.6",
    # Using the official `mcp` SDK (includes FastMCP module) rather than the
    # third-party `fastmcp` package. Rationale: official SDK is
    # maintained upstream, supports both stdio and http transports out of the
    # box, and the FastMCP surface we need ships as `mcp.server.fastmcp`.
    # Revisit if ergonomics of the third-party `fastmcp` clearly pull ahead.
    "mcp>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "ruff>=0.5",
    "mypy>=1.10",
    "pre-commit>=3.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["osm"]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    "tests/fixtures/addons",
    "tests/fixtures/odoo_ce_subset_manifests",
    "tests/fixtures/odoo_ce_subset",
    "tests/fixtures/custom_addons",
    "tests/fixtures/python_parser/broken_syntax.py",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["osm"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
disallow_untyped_defs = true
no_implicit_optional = true

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra"

[dependency-groups]
dev = [
    "tiktoken>=0.12.0",
]
