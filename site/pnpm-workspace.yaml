# pnpm-workspace.yaml — required by pnpm 10+ to opt in to native postinstall scripts.
#
# `packages: ['.']` is REQUIRED by pnpm whenever this file exists (pnpm 9
# errors out with "packages field missing or empty" otherwise), even for a
# single-package repo.
#
# pnpm 9 honors `pnpm.onlyBuiltDependencies` from package.json; pnpm 10+
# requires the same list here in the workspace file (the package.json block
# is ignored on pnpm 10+). We keep both for forward+backward compat across
# pnpm 9, 10, and 11.
#
# Without onlyBuiltDependencies, pnpm 10+ refuses to run esbuild/sharp
# postinstall scripts and `pnpm build` aborts with ERR_PNPM_IGNORED_BUILDS
# before astro runs.
packages:
  - '.'

allowBuilds:
  esbuild: true
  sharp: true

onlyBuiltDependencies:
  - esbuild
  - sharp

# Force devalue ≥ 5.8.1 to close CVE-2026-42570 (transitive via astro).
# Force yaml ≥ 2.8.3 to close CVE-2026-33532 (transitive via @astrojs/check
# → @astrojs/language-server → volar-service-yaml → yaml-language-server@1.20.0
# which pins yaml@2.7.1 — dev-tooling only, not in production runtime).
# Force esbuild ≥ 0.28.1 to close GHSA-gv7w-rqvm-qjhr (HIGH) + related LOW
# (transitive via astro → vite → esbuild). pnpm 10+ reads overrides from
# pnpm-workspace.yaml, not package.json (package.json pnpm.overrides kept
# for pnpm 9 backward compat).
overrides:
  devalue: ^5.8.1
  yaml: '>=2.8.3'
  esbuild: '>=0.28.1'
