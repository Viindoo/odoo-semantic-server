# nginx configuration template for Odoo Semantic MCP — M8 Astro Unified Architecture
#
# GATE: This configuration applies only after:
#   1. Stream A (W1 — FastAPI JSON API) merged
#   2. Stream B (W3 — admin pages + W5 — landing pages) deployed to Astro server
#   3. Astro server running on 127.0.0.1:4321
#
# Routing rules:
#   /api/*           → FastAPI :8003 (JSON API — new in M8)
#   /admin/*         → Astro :4321 (admin pages SSR — new in M8)
#   /                → Astro :4321 (landing page — new in M8)
#   /mcp             → FastAPI :8002 (MCP protocol — unchanged)
#   /install/        → FastAPI :8002 (client setup install — unchanged)
#   /health          → FastAPI :8002 (health check endpoint — unchanged)
#
# nginx longest-prefix matching ensures /api/, /mcp, /install/, /health
# take precedence over / (root location).

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name odoo-semantic.viindoo.com;

    # TLS certificate — admin: replace with real paths (typically from Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/odoo-semantic.viindoo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/odoo-semantic.viindoo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers — transport / framing / sniffing / referrer.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"             always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header Referrer-Policy           "no-referrer"      always;
    # ─────────────────────────────────────────────────────────────────────────
    # CSP COMPOSITION POLICY (per W3C CSP3 §4.1 multiple-policies intersection)
    #
    # When the response carries TWO CSP headers (one from nginx + one from the
    # Astro / FastAPI middleware), the user agent intersects them per directive
    # — the MOST RESTRICTIVE source list wins for each directive. So the
    # nginx-edge CSP below is intentionally a **PERMISSIVE SUPERSET** of every
    # path-specific CSP the application middleware might emit:
    #
    #   - includes hCaptcha origins (so /signup's middleware CSP, which adds
    #     them, intersects to the same set rather than getting them dropped),
    #   - includes 'unsafe-inline' for script-src + style-src (so Astro
    #     inline modules aren't stripped on admin pages),
    #   - keeps frame-ancestors 'none' and form-action 'self' at the strict
    #     intersection floor.
    #
    # Why this dual-layer model:
    #   - Astro prerenders /, /pricing, /bootstrap, /benchmarks at build time;
    #     the Node SSR middleware NEVER runs for those routes. Without an
    #     nginx CSP, those pages would ship with no CSP at all.
    #   - SSR pages (/signup, /verify-email, /admin/*) DO go through the
    #     middleware, which adds tighter per-path policy (e.g. /admin/*
    #     excludes hCaptcha origins → blast-radius minimization).
    #
    # Rule of thumb when editing this CSP: the edge baseline must be the
    # UNION of every origin/keyword the middleware ever grants. Never
    # tighten this string without auditing site/src/middleware.ts —
    # tightening here SILENTLY strips middleware grants. Tests:
    # tests/browser/public/test_csp_headers.py (asserts the SSR-side
    # middleware contract).
    # ─────────────────────────────────────────────────────────────────────────
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.hcaptcha.com https://newassets.hcaptcha.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.hcaptcha.com https://newassets.hcaptcha.com; frame-src 'self' https://newassets.hcaptcha.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Allow larger request bodies for SSH key upload via /api/repos/clone
    client_max_body_size 10M;

    # NEW in M8: FastAPI JSON API endpoint (port 8003)
    # Handles REST API for repo management, auth verification, graph snapshots.
    # proxy_read_timeout raised to 300s: apply-preset with many repos can take
    # up to 120s (APPLY_PRESET_TIMEOUT default), plus server-side queue time.
    location /api/ {
        proxy_pass         http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # NEW in M8: Astro SSR server for landing + admin pages (port 4321)
    # Serves static landing page (/), admin dashboard (/admin/), repo management (/admin/repos/)
    # Handles WebSocket upgrades for real-time updates (e.g., clone progress polling)
    location / {
        proxy_pass         http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket upgrade headers for Astro
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # UNCHANGED: MCP protocol endpoint
    # Supports Server-Sent Events (SSE) for streaming MCP responses
    location /mcp {
        proxy_pass         http://127.0.0.1:8002/mcp;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE requires no buffering
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # UNCHANGED: Client setup endpoint (matches /install/ AND assets beneath)
    location /install/ {
        proxy_pass         http://127.0.0.1:8002/install/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    # Bare /install (no trailing slash) → permanent redirect to /install/.
    # Without this, /install falls through to the Astro location and 404s.
    location = /install {
        return 301 https://$host/install/;
    }

    # UNCHANGED: Health check endpoint (no auth required, for load balancers)
    location /health {
        proxy_pass         http://127.0.0.1:8002/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_read_timeout 5s;
    }

    # OAuth discovery stub — Claude Code SDK probes this when auth fails.
    # Return JSON so the SDK surfaces a clean error instead of HTML 404.
    location = /.well-known/openid-configuration {
        default_type application/json;
        return 404 '{"error":"oauth_not_supported","message":"This server uses X-API-Key header auth. Add --header X-API-Key:<key> when registering."}';
    }
}

# HTTP → HTTPS redirect (and ACME webroot for Let's Encrypt renewal)
server {
    listen 80;
    listen [::]:80;
    server_name odoo-semantic.viindoo.com;

    # certbot webroot challenge — required for `certbot renew` to succeed
    # without taking nginx offline. Must come before the catch-all redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
