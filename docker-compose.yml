# Dev topology for osm. Real production deployment covered in WP-10 / P3.
#
# Tailscale sidecar block below is commented out. Enable when you have a
# reusable Tailscale auth key in .env (TS_AUTHKEY) and want db + mcp
# reachable only over your tailnet rather than 0.0.0.0.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-osm}
      POSTGRES_USER: ${POSTGRES_USER:-osm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osm} -d ${POSTGRES_DB:-osm}"]
      interval: 5s
      timeout: 3s
      retries: 20
    # When Tailscale sidecar is enabled, remove `ports` above and
    # uncomment the next two lines so db rides the tailscale netns:
    # network_mode: "service:tailscale"
    # depends_on:
    #   - tailscale

  mcp:
    # Placeholder: real server image + command wired up in WP-8.
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://osm:changeme@db:5432/osm}
      OSM_TENANT: ${OSM_TENANT:-public}
    depends_on:
      db:
        condition: service_healthy
    # When Tailscale sidecar is enabled:
    # network_mode: "service:tailscale"

  # ------------------------------------------------------------------
  # Tailscale sidecar (disabled by default).
  #
  # Steps to enable:
  #   1. Generate a reusable auth key in the Tailscale admin panel
  #      (personal tailnet is fine for solo dev).
  #   2. Put the key in .env as TS_AUTHKEY=tskey-auth-...
  #   3. Uncomment the whole `tailscale:` service block below.
  #   4. Switch `db` and `mcp` to `network_mode: "service:tailscale"`
  #      (see commented hints above) and drop their `ports` mappings.
  #   5. `docker compose up -d tailscale db mcp`.
  #
  # tailscale:
  #   image: tailscale/tailscale:latest
  #   hostname: osm-dev
  #   environment:
  #     TS_AUTHKEY: ${TS_AUTHKEY}
  #     TS_EXTRA_ARGS: "--ssh"
  #     TS_STATE_DIR: /var/lib/tailscale
  #   volumes:
  #     - tailscale_state:/var/lib/tailscale
  #     - /dev/net/tun:/dev/net/tun
  #   cap_add:
  #     - NET_ADMIN
  #     - NET_RAW
  #   restart: unless-stopped
  # ------------------------------------------------------------------

volumes:
  db_data:
  # tailscale_state:
