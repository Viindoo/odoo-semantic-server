# Dev topology for osm: Postgres (with pgvector) + the MCP server.
#
# This is the Docker path for local dev / a quick self-host. To run the
# server directly on a Linux box and let teammates connect over SSH (the
# dev-machine-as-server model — no Docker), see scripts/server-setup.sh
# and scripts/onboard.sh.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-osm}
      POSTGRES_USER: ${POSTGRES_USER:-osm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osm} -d ${POSTGRES_DB:-osm}"]
      interval: 5s
      timeout: 3s
      retries: 20

  mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://osm:changeme@db:5432/osm}
      OSM_TENANT: ${OSM_TENANT:-public}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
