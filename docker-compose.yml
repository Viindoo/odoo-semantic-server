# docker-compose.yml — DB TIER ONLY
# Chạy file này trên DB server (hoặc cùng server với app khi dev).
# App tier kết nối qua NEO4J_URI và PG_DSN trong .env — không cần sửa code.
name: odoo-semantic-mcp  # Pin project name so volumes survive a repo rename (ADR-0027)
services:
  neo4j:
    image: ${NEO4J_IMAGE:-neo4j:5.26.25}  # canonical version in .env.example
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      # Khi Neo4j chạy trên server riêng, phải set advertised address
      # để bolt client redirect đúng host (không bị redirect về container hostname):
      NEO4J_server_bolt_advertised__address: ${NEO4J_ADVERTISED_HOST:-localhost}:7687
      NEO4J_dbms_security_auth__max__failed__attempts: "10"
    ports:
      # Same-server default — DB localhost only. Reverse proxy / SSH tunnel
      # for split-tier deploy: change to "7687:7687" + firewall app-server IP.
      - "127.0.0.1:7474:7474"  # Browser UI
      - "127.0.0.1:7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      # Extract password from NEO4J_AUTH ("neo4j/<pw>") inside the container.
      # Using NEO4J_PASSWORD as a bare env var would be auto-translated by Neo4j's
      # settings loader (NEO4J_FOO → foo) and rejected by strict_validation.
      # Without this, the healthcheck loops with the literal "password" fallback,
      # tripping `dbms.security.auth_max_failed_attempts` and locking out real
      # clients with `Neo.ClientError.Security.AuthenticationRateLimit`.
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#neo4j/}\" 'RETURN 1' || exit 1"]
      interval: 10s
      retries: 10

  postgres:
    image: ${PG_IMAGE:-pgvector/pgvector:0.8.2-pg16}  # canonical version in .env.example
    # `unless-stopped` so the DB tier survives a clean host reboot — a clean
    # stop is NOT a failure, so `on-failure:N` would leave postgres down after
    # a reboot (the 2026-05-21 outage: MCP 503 for ~27 min). The crash-loop
    # risk that originally motivated `on-failure:5` (single-file bind-mount
    # "not a directory" hard-fail after a wrong-cwd `docker compose up`,
    # incident 2026-05-19) is now structurally defused: the initdb.d mount is
    # a whole directory (worst case = scripts not found, container still
    # starts), the project `name:` is pinned (ADR-0027) so the named volume
    # always attaches, and the MCP server stays up in degraded mode if PG is
    # unreachable. See docs/deploy/db-tier-operations.md.
    restart: unless-stopped
    environment:
      POSTGRES_DB: odoo_semantic
      POSTGRES_USER: odoo_semantic
      POSTGRES_PASSWORD: ${PG_PASSWORD:-password}
    ports:
      # Same-server default. For split-tier: change to "5432:5432" + firewall.
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Mount the WHOLE initdb.d/ directory, not a single file. Single-file
      # bind mounts are fragile: if cwd is wrong at `docker compose up`, the
      # Docker daemon (root) silently auto-creates an empty *directory* at
      # the source path, and the next container start fails with
      # `not a directory: Are you trying to mount a directory onto a file ...?`
      # With a directory mount the worst case is "init scripts not found" —
      # the container still starts. See db-tier-operations.md.
      - ./docker/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo_semantic"]
      interval: 10s
      retries: 5

volumes:
  neo4j_data:
  pg_data:
