<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Odoo Semantic MCP Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 10px;
            padding: 2.5rem 2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
            width: 100%;
            max-width: 380px;
        }
        .brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: #a78bfa;
            margin-bottom: 0.25rem;
        }
        h1 {
            font-size: 1.35rem;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
        }
        .alert {
            padding: 0.6rem 0.9rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            background: #fee2e2;
            color: #991b1b;
            font-size: 0.88rem;
        }
        label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 0.3rem;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 1rem;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99,102,241,0.15);
        }
        button[type="submit"] {
            width: 100%;
            padding: 0.6rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.25rem;
            transition: background 0.15s;
        }
        button[type="submit"]:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">Odoo Semantic MCP</div>
        <h1>Admin Login</h1>

        {% if error == "invalid_credentials" %}
        <div class="alert" role="alert">Invalid username or password.</div>
        {% elif error == "db_unavailable" %}
        <div class="alert" role="alert">Database unavailable. Check server logs.</div>
        {% elif error %}
        <div class="alert" role="alert">Login error. Please try again.</div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="hidden" name="next" value="{{ next | e }}">

            <label for="username">Username</label>
            <input
                type="text"
                id="username"
                name="username"
                autocomplete="username"
                maxlength="64"
                required
                autofocus
            >

            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                maxlength="255"
                required
            >

            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
